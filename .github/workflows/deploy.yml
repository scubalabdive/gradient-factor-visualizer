name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, and mint the OIDC token
# actions/deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # npm ci at the repo root installs every workspace (engine, gas-model, apps).
      - run: npm ci
      # Build both apps (each: tsc typecheck + vite build into its own workspace dist).
      - run: npm run build -w apps/gf-visualizer
      - run: npm run build -w apps/gas-planner
      # Assemble the Pages site: the GF Visualizer at the root, the Gas Planner at
      # /planner. The planner's vite base is './' (relative), so it resolves assets
      # correctly at whatever sub-path it lands on.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/planner
          cp -r apps/gf-visualizer/dist/. _site/
          cp -r apps/gas-planner/dist/. _site/planner/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
