name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, and mint the OIDC token
# actions/deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm ci at the repo root installs every workspace (engine, gas-model, apps).
      - run: npm ci
      # Root `build` delegates to the visualizer workspace (tsc typecheck + vite build).
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          # Monorepo: the visualizer now builds into its own workspace dist.
          path: ./apps/gf-visualizer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
